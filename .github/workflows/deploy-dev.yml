name: Deploy Dev on Push

on:
  push:
    branches:
      - 'dev'

concurrency:
  group: development-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: "→ thuchocvn.vn (dev, ${{ github.sha }})"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: development
      url: https://thuchocvn.vn

    steps:
      - name: "Deploy dev via SSH"
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2223
          script_stop: true
          command_timeout: 15m
          script: |
            cd /var/www/devminhan
            bash deploy-dev.sh
